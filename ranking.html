<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Seleção — Ranking</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1628; min-height: 100vh;
      color: #fff; display: flex;
      background-image: radial-gradient(ellipse at top, #0d2145 0%, #0a1628 70%);
    }
    .sidebar {
      width: 220px; min-height: 100vh;
      background: #0d1f3c; border-right: 1px solid #1a3a6b;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 100;
    }
    .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid #1a3a6b; }
    .sidebar-logo h1 { font-size: 20px; font-weight: 800; }
    .sidebar-logo h1 span { color: #dc1e32; }
    .sidebar-logo p { font-size: 11px; color: #7a9cc4; margin-top: 4px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: #7a9cc4;
      transition: all 0.2s; text-decoration: none; margin-bottom: 4px;
    }
    .nav-item:hover { background: #071224; color: #fff; }
    .nav-item.ativo { background: #dc1e32; color: #fff; }
    .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
    .nav-item.admin-item { margin-top: 8px; border-top: 1px solid #1a3a6b; padding-top: 16px; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid #1a3a6b; }
    .btn-sair {
      width: 100%; padding: 10px; background: none;
      border: 1px solid #1a3a6b; color: #7a9cc4;
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .btn-sair:hover { border-color: #dc1e32; color: #fff; }
    .content { margin-left: 220px; flex: 1; padding: 32px; max-width: 700px; }
    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 22px; font-weight: 800; }
    .page-header p { color: #7a9cc4; font-size: 14px; margin-top: 4px; }
    .ranking-card {
      background: #0d1f3c; border: 1px solid #1a3a6b;
      border-radius: 12px; overflow: hidden;
    }
    .ranking-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; border-bottom: 1px solid #071224;
      transition: background 0.2s;
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-item:hover { background: #071224; }
    .ranking-pos {
      font-size: 18px; font-weight: 800;
      width: 36px; text-align: center; flex-shrink: 0;
    }
    .pos-1 { color: #FFD700; }
    .pos-2 { color: #C0C0C0; }
    .pos-3 { color: #CD7F32; }
    .pos-outros { color: #1a3a6b; }
    .ranking-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #071224; display: flex; align-items: center;
      justify-content: center; font-size: 16px; font-weight: 800;
      color: #dc1e32; flex-shrink: 0; border: 2px solid #1a3a6b;
    }
    .ranking-info { flex: 1; }
    .ranking-nome { font-size: 14px; font-weight: 700; }
    .ranking-sub { font-size: 12px; color: #7a9cc4; margin-top: 2px; }
    .ranking-qtd {
      font-size: 20px; font-weight: 800; color: #dc1e32;
      text-align: right;
    }
    .ranking-qtd span { display: block; font-size: 10px; color: #7a9cc4; font-weight: 400; }
    .carregando { text-align: center; color: #1a3a6b; padding: 60px 0; font-size: 15px; }
    .eu-destaque { border-color: #dc1e32 !important; background: rgba(220,30,50,0.05); }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Gran <span>Seleção</span></h1>
    <p>Colecione os professores</p>
  </div>
  <div class="sidebar-nav">
    <a href="album.html" class="nav-item"><span class="icon">📖</span> Meu Álbum</a>
    <a href="missoes.html" class="nav-item"><span class="icon">🎯</span> Missões</a>
    <a href="ranking.html" class="nav-item ativo"><span class="icon">🏆</span> Ranking</a>
    <a href="admin.html" class="nav-item admin-item" id="link-admin" style="display:none"><span class="icon">⚙️</span> Admin</a>
  </div>
  <div class="sidebar-footer">
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</nav>
<div class="content">
  <div class="page-header">
    <h2>Ranking</h2>
    <p>Os colecionadores mais dedicados da Gran Seleção!</p>
  </div>
  <div id="ranking-container"><div class="carregando">Carregando ranking...</div></div>
</div>
<script>
  const _url = 'https://zjkyaqtaaflvdqpqeabm.supabase.co'
  const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqa3lhcXRhYWZsdmRxcHFlYWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODg3MDcsImV4cCI6MjA5NTI2NDcwN30.uNrqA8ctiG_QlR10wYSVagFi-dmyhQxKCzLZYKe6Gfg'
  const sb = window.supabase.createClient(_url, _key)
  let meuId = null

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'index.html'; return; }
    meuId = session.user.id
    const { data: admin } = await sb.from('admins').select('id').eq('user_id', meuId).single()
    if (admin) document.getElementById('link-admin').style.display = 'flex'
    await carregarRanking()
  }

  async function carregarRanking() {
    const { data, error } = await sb.rpc('ranking_figurinhas')
    const container = document.getElementById('ranking-container')
    if (error || !data || data.length === 0) {
      container.innerHTML = '<div class="carregando">Nenhum dado de ranking ainda. Seja o primeiro a colecionar!</div>'
      return
    }
    const medalhas = ['🥇', '🥈', '🥉']
    container.innerHTML = '<div class="ranking-card">' + data.map((item, i) => {
      const posClass = i === 0 ? 'pos-1' : i === 1 ? 'pos-2' : i === 2 ? 'pos-3' : 'pos-outros'
      const medalha = i < 3 ? medalhas[i] : (i + 1)
      const nome = item.nome_completo || item.email?.split('@')[0] || 'Colecionador'
      const inicial = nome.charAt(0).toUpperCase()
      const euClass = item.user_id === meuId ? ' eu-destaque' : ''
      return '<div class="ranking-item' + euClass + '">' +
        '<div class="ranking-pos ' + posClass + '">' + medalha + '</div>' +
        '<div class="ranking-avatar">' + inicial + '</div>' +
        '<div class="ranking-info">' +
        '<div class="ranking-nome">' + nome + (item.user_id === meuId ? ' (você)' : '') + '</div>' +
        '<div class="ranking-sub">Colecionador Gran</div>' +
        '</div>' +
        '<div class="ranking-qtd">' + item.total + '<span>figurinhas</span></div>' +
        '</div>'
    }).join('') + '</div>'
  }

  async function sair() { await sb.auth.signOut(); window.location.href = 'index.html' }
  init()
</script>
</body>
</html>
