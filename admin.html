<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imparáveis — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --amarelo: #F3BF1A;
      --verde: #04492A; --azul: #0D134C; --branco: #FFFFFF; }
    body { font-family: 'Nunito', 'Trebuchet MS', sans-serif; background: linear-gradient(135deg, #0D134C 0%, #111a5e 100%); min-height: 100vh; color: var(--branco); display: flex; }
    .sidebar { width: 230px; min-height: 100vh; background: rgba(10,15,60,0.95); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 28px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .logo-marca { display: flex; align-items: center; gap: 10px; }
    .logo-icone { width: 38px; height: 38px; background: var(--amarelo); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(243,191,26,0.4); }
    .logo-texto h1 { font-size: 18px; font-weight: 900; line-height: 1; }
    .logo-texto h1 span { color: var(--amarelo); }
    .logo-texto p { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-section-title { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 10px; margin: 16px 0 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.45); transition: all 0.2s; text-decoration: none; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-item.ativo { background: #04492A; color: var(--branco); box-shadow: 0 4px 12px rgba(4,73,42,0.3); }
    .nav-item .icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
    .btn-sair { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all 0.2s; }
    .btn-sair:hover { background: rgba(243,191,26,0.15); border-color: rgba(243,191,26,0.3); color: var(--branco); }
    .content { margin-left: 230px; flex: 1; padding: 36px; max-width: calc(100% - 230px); }
    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
    .page-header p { color: rgba(255,255,255,0.45); font-size: 14px; margin-top: 4px; font-weight: 600; }
    .admin-tabs { display: flex; gap: 4px; background: rgba(10,15,60,0.8); border-radius: 12px; padding: 4px; margin-bottom: 28px; width: fit-content; border: 1px solid rgba(255,255,255,0.07); }
    .admin-tab { padding: 10px 20px; border-radius: 9px; border: none; background: none; color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 800; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .admin-tab.ativo { background: #04492A; color: var(--branco); box-shadow: 0 4px 12px rgba(4,73,42,0.3); }
    .admin-tab:hover:not(.ativo) { color: var(--branco); background: rgba(255,255,255,0.05); }
    .secao { display: none; }
    .secao.ativa { display: block; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 28px; margin-bottom: 24px; }
    .card h3 { font-size: 12px; font-weight: 900; color: var(--amarelo); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 0; }
    .form-group.full { grid-column: 1 / -1; }
    label { display: block; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.4); margin-bottom: 8px; letter-spacing: 0.8px; text-transform: uppercase; }
    input, select, textarea { width: 100%; padding: 12px 16px; background: rgba(13,19,76,0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--branco); font-size: 14px; font-family: inherit; outline: none; transition: all 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--amarelo); box-shadow: 0 0 0 3px rgba(243,191,26,0.12); }
    select option { background: #0D134C; }
    textarea { resize: vertical; min-height: 80px; }
    .foto-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .foto-preview { width: 80px; height: 80px; border-radius: 50%; background: rgba(13,19,76,0.7); border: 2px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; overflow: hidden; transition: all 0.2s; flex-shrink: 0; }
    .foto-preview:hover { border-color: var(--amarelo); }
    .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
    .foto-info strong { display: block; color: var(--branco); font-size: 13px; font-weight: 800; margin-bottom: 4px; }
    .foto-info span { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 600; }
    input[type="file"] { display: none; }
    .btn { padding: 12px 24px; background: var(--amarelo); color: var(--branco); border: none; border-radius: 10px; font-size: 14px; font-weight: 800; font-family: inherit; cursor: pointer; transition: all 0.2s; margin-top: 20px; box-shadow: 0 4px 16px rgba(243,191,26,0.3); }
    .btn:hover { background: #035c35; transform: translateY(-1px); }
    .btn:disabled { background: rgba(255,255,255,0.1); box-shadow: none; cursor: not-allowed; transform: none; }
    .mensagem { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; display: none; }
    .mensagem.erro { background: rgba(243,191,26,0.15); color: #ff8090; border: 1px solid rgba(243,191,26,0.3); }
    .mensagem.sucesso { background: rgba(40,200,100,0.15); color: #6bff9a; border: 1px solid rgba(40,200,100,0.3); }
    .tabela { width: 100%; border-collapse: collapse; font-size: 13px; }
    .tabela th { text-align: left; padding: 10px 12px; color: rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.06); font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; font-size: 10px; }
    .tabela td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; font-weight: 600; }
    .tabela tr:last-child td { border-bottom: none; }
    .tabela tr:hover td { background: rgba(255,255,255,0.02); }
    .foto-mini { width: 36px; height: 36px; border-radius: 50%; background: rgba(13,19,76,0.8); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: var(--amarelo); overflow: hidden; flex-shrink: 0; border: 2px solid rgba(243,191,26,0.2); }
    .foto-mini img { width: 100%; height: 100%; object-fit: cover; }
    .professor-cell { display: flex; align-items: center; gap: 10px; }
    .codigo-badge { background: rgba(13,19,76,0.8); border: 1px solid rgba(255,255,255,0.08); padding: 5px 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 3px; color: var(--amarelo); font-weight: 700; }
    .badge-status { padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 800; }
    .badge-status.ativo { background: rgba(40,200,100,0.15); color: #6bff9a; }
    .badge-status.inativo { background: rgba(243,191,26,0.15); color: #ff8090; }
    .btn-copiar { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .btn-copiar:hover { border-color: rgba(243,191,26,0.4); color: var(--branco); background: rgba(243,191,26,0.1); }
    .carregando { text-align: center; color: rgba(255,255,255,0.15); padding: 40px; font-weight: 700; }
    .acesso-negado { text-align: center; padding: 80px 32px; }
    .acesso-negado strong { display: block; font-size: 24px; color: var(--amarelo); margin-bottom: 8px; font-weight: 900; }
    .acesso-negado p { color: rgba(255,255,255,0.4); font-weight: 600; }
    .missao-lista-item { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: flex-start; gap: 16px; }
    .missao-lista-item:last-child { border-bottom: none; }
    .missao-info { flex: 1; }
    .missao-titulo-item { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .missao-desc-item { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-weight: 600; line-height: 1.5; }
    .missao-status { font-size: 11px; font-weight: 800; }
    .tipo-badge { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 800; background: rgba(243,191,26,0.1); border: 1px solid rgba(243,191,26,0.2); color: var(--amarelo); white-space: nowrap; flex-shrink: 0; }
    .hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; font-weight: 600; line-height: 1.5; }

    .missao-acoes { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .missao-link-item { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; word-break: break-all; }

    .btn-acao-missao {
      padding: 5px 12px; border-radius: 7px; font-size: 11px;
      font-weight: 800; font-family: inherit; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1); background: none;
      color: rgba(255,255,255,0.5); transition: all 0.2s; white-space: nowrap;
    }
    .btn-editar-missao:hover { border-color: var(--amarelo); color: var(--amarelo); }
    .btn-toggle-missao:hover { border-color: rgba(100,200,100,0.5); color: #6bff9a; }
    .btn-excluir-missao:hover { border-color: rgba(255,100,100,0.5); color: #ff8090; }

    /* MODAL EDIÇÃO */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.visivel { display: flex; }
    .modal-edicao {
      background: linear-gradient(145deg, #162060, #1e2d7a);
      border: 1px solid rgba(243,191,26,0.3);
      border-radius: 20px; padding: 36px;
      width: 90%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      animation: aparecer 0.3s ease;
    }
    @keyframes aparecer { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-edicao h3 { font-size: 18px; font-weight: 900; margin-bottom: 24px; color: var(--amarelo); text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
    .modal-acoes { display: flex; gap: 10px; margin-top: 24px; }
    .btn-salvar { flex: 1; padding: 12px; background: #04492A; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .btn-salvar:hover { background: #d4a516; }
    .btn-salvar:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; }
    .btn-cancelar-modal { padding: 12px 20px; background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .btn-cancelar-modal:hover { border-color: rgba(243,191,26,0.4); color: #fff; }
    .btn-editar { background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; margin-right: 4px; }
    .btn-editar:hover { border-color: rgba(243,191,26,0.4); color: #fff; }
    .foto-edit-preview { width: 70px; height: 70px; border-radius: 50%; background: rgba(13,19,76,0.8); border: 2px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; overflow: hidden; flex-shrink: 0; transition: border 0.2s; }
    .foto-edit-preview:hover { border-color: var(--amarelo); }
    .foto-edit-preview img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>

</div>
<script>
  const _url = 'https://zjkyaqtaaflvdqpqeabm.supabase.co'
  const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqa3lhcXRhYWZsdmRxcHFlYWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODg3MDcsImV4cCI6MjA5NTI2NDcwN30.uNrqA8ctiG_QlR10wYSVagFi-dmyhQxKCzLZYKe6Gfg'
  const sb = window.supabase.createClient(_url, _key)
  let fotoArquivo = null

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'index.html'; return; }
    const { data: admin } = await sb.from('admins').select('id').eq('user_id', session.user.id).single()
    if (!admin) {
      document.getElementById('content').innerHTML = '<div class="acesso-negado"><strong>Acesso negado</strong><p>Você não tem permissão para acessar esta área.</p></div>'
      return
    }
    renderizarAdmin()
    mostrarSecao('professores', { target: document.querySelector('.admin-tab') })
  }

  function renderizarAdmin() {
    document.getElementById('content').innerHTML = `
      <div class="page-header">
        <h2>Painel Admin</h2>
        <p>Gerencie professores, missões e configurações da plataforma.</p>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab ativo" onclick="mostrarSecao('professores', event)">👨‍🏫 Professores</button>
        <button class="admin-tab" onclick="mostrarSecao('missoes', event)">🎯 Missões</button>
        <button class="admin-tab" onclick="mostrarSecao('configuracoes', event)">⚙️ Configurações</button>
      </div>

      <div class="secao ativa" id="secao-professores">
        <div class="card">
          <h3>Cadastrar Professor</h3>
          <div class="foto-row">
            <div class="foto-preview" id="foto-preview" onclick="document.getElementById('input-foto').click()">📷</div>
            <div class="foto-info"><strong>Foto do professor</strong><span>Clique para selecionar — JPG ou PNG, máx. 2MB</span></div>
            <input type="file" id="input-foto" accept="image/*" onchange="previewFoto(event)">
          </div>
          <div class="form-grid">
            <div class="form-group"><label>Nome completo</label><input type="text" id="prof-nome" placeholder="Ex: Alexandre Meirelles"></div>
            <div class="form-group"><label>Carreira</label>
              <select id="prof-area">
                <option value="">Selecione...</option>
                <option>Administrativa</option><option>Bancárias</option><option>Carreira Diplomática</option>
                <option>Carreiras Policiais</option><option>Controle e Gestão</option><option>Delegado</option>
                <option>Educação</option><option>Exame CFC</option><option>Exame da OAB</option>
                <option>Fiscal</option><option>Jurídico</option><option>Legislativa</option>
                <option>Residências</option><option>Saúde</option><option>Segurança Pública</option>
                <option>Tecnologia da Informação</option><option>Tribunais</option>
              </select>
            </div>
            <div class="form-group"><label>Rede Social</label>
              <select id="prof-rede-social">
                <option value="">Selecione...</option>
                <option>Instagram</option>
                <option>YouTube</option>
                <option>TikTok</option>
                <option>Twitter</option>
                <option>LinkedIn</option>
                <option>Facebook</option>
              </select>
            </div>
            <div class="form-group"><label>Link da Rede Social</label><input type="url" id="prof-rede-social-url" placeholder="https://instagram.com/professor"></div>
          </div>
          <button class="btn" onclick="cadastrarProfessor()">Cadastrar e gerar código</button>
          <div class="mensagem" id="msg-prof"></div>
        </div>
        <div class="card">
          <h3>Professores Cadastrados</h3>
          <div id="tabela-professores"><div class="carregando">Carregando...</div></div>
        </div>
      </div>

      <div class="secao" id="secao-missoes">
        <div class="card">
          <h3>Cadastrar Missão</h3>
          <div class="form-grid">
            <div class="form-group"><label>Título</label><input type="text" id="missao-titulo" placeholder="Ex: Assista a live de Fiscal"></div>
            <div class="form-group"><label>Tipo</label>
              <select id="missao-tipo">
                <option value="">Selecione...</option>
                <option>Live</option><option>E-mail</option><option>Blog</option>
                <option>Redes Sociais</option><option>Indicação</option>
              </select>
            </div>
            <div class="form-group"><label>Data do evento (opcional)</label><input type="date" id="missao-data"></div>
            <div class="form-group"><label>Horário do evento (opcional)</label><input type="time" id="missao-horario"></div>
            <div class="form-group full"><label>Descrição</label><textarea id="missao-desc" placeholder="Explique o que o aluno precisa fazer..."></textarea></div>
            <div class="form-group full"><label>Link da ação (opcional)</label><input type="url" id="missao-link" placeholder="https://youtube.com/live/..."></div>
            <div class="form-group full"><label>Texto do botão CTA (máx. 30 caracteres)</label><input type="text" id="missao-cta" placeholder="🎯 Resgatar figurinha" maxlength="30"><div class="hint">Deixe em branco para usar o padrão: 🎯 Resgatar figurinha</div></div>
          </div>
          <button class="btn" onclick="cadastrarMissao()">Publicar missão</button>
          <div class="mensagem" id="msg-missao"></div>
        </div>
        <div class="card">
          <h3>Missões Cadastradas</h3>
          <div id="lista-missoes"><div class="carregando">Carregando...</div></div>
        </div>
      </div>

      <div class="secao" id="secao-configuracoes">
        <div class="card">
          <h3>Texto de Compartilhamento</h3>
          <div class="form-group">
            <label>Texto exibido quando o aluno compartilha o álbum</label>
            <textarea id="texto-compartilhamento" style="min-height:100px"></textarea>
            <div class="hint">Use {qtd} para o número de figurinhas do aluno e {total} para o total disponível. Exemplo: "Já tenho {qtd} de {total} figurinhas!"</div>
          </div>
          <button class="btn" onclick="salvarConfiguracao()">Salvar texto</button>
          <div class="mensagem" id="msg-config"></div>
        </div>
      </div>
    `
  }

  function mostrarSecao(secao, event) {
    document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'))
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('ativo'))
    document.getElementById('secao-' + secao).classList.add('ativa')
    if (event && event.target) event.target.classList.add('ativo')
    if (secao === 'professores') carregarProfessores()
    if (secao === 'missoes') carregarMissoes()
    if (secao === 'configuracoes') carregarConfiguracao()
  }

  function previewFoto(event) {
    const file = event.target.files[0]
    if (!file) return
    fotoArquivo = file
    const reader = new FileReader()
    reader.onload = (e) => { document.getElementById('foto-preview').innerHTML = '<img src="' + e.target.result + '">' }
    reader.readAsDataURL(file)
  }

  function gerarCodigoAleatorio() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
    let codigo = ''
    for (let i = 0; i < 8; i++) codigo += chars.charAt(Math.floor(Math.random() * chars.length))
    return codigo
  }

  async function cadastrarProfessor() {
    const nome = document.getElementById('prof-nome').value.trim()
    const area = document.getElementById('prof-area').value
    const btn = document.querySelector('#secao-professores .btn')
    if (!nome || !area) { mostrarMsg('msg-prof', 'Preencha o nome e a carreira.', 'erro'); return; }
    btn.disabled = true; btn.textContent = 'Cadastrando...'
    let foto_url = null
    if (fotoArquivo) {
      const ext = fotoArquivo.name.split('.').pop()
      const nomeArq = Date.now() + '.' + ext
      const { error } = await sb.storage.from('fotos').upload(nomeArq, fotoArquivo, { upsert: true })
      if (error) { mostrarMsg('msg-prof', 'Erro no upload: ' + error.message, 'erro'); btn.disabled = false; btn.textContent = 'Cadastrar e gerar código'; return; }
      foto_url = sb.storage.from('fotos').getPublicUrl(nomeArq).data.publicUrl
    }
    const rede_social = document.getElementById('prof-rede-social').value
    const rede_social_url = document.getElementById('prof-rede-social-url').value.trim()
    const { data: prof, error: errProf } = await sb.from('professores').insert({ nome, area, foto_url, rede_social: rede_social || null, rede_social_url: rede_social_url || null }).select().single()
    if (errProf) { mostrarMsg('msg-prof', 'Erro: ' + errProf.message, 'erro'); btn.disabled = false; btn.textContent = 'Cadastrar e gerar código'; return; }
    let codigo = gerarCodigoAleatorio()
    for (let i = 0; i < 10; i++) {
      const { data: existe } = await sb.from('codigos').select('id').eq('codigo', codigo).single()
      if (!existe) break
      codigo = gerarCodigoAleatorio()
    }
    await sb.from('codigos').insert({ codigo, professor_id: prof.id, ativo: true })
    mostrarMsg('msg-prof', '✅ Cadastrado! Código gerado: ' + codigo, 'sucesso')
    document.getElementById('prof-nome').value = ''
    document.getElementById('prof-area').value = ''
    document.getElementById('prof-rede-social').value = ''
    document.getElementById('prof-rede-social-url').value = ''
    document.getElementById('foto-preview').innerHTML = '📷'
    fotoArquivo = null
    btn.disabled = false; btn.textContent = 'Cadastrar e gerar código'
    await carregarProfessores()
  }

  async function carregarProfessores() {
    const { data } = await sb.from('professores').select('id, nome, area, foto_url, codigos(codigo, ativo)').order('area')
    if (!data || data.length === 0) { document.getElementById('tabela-professores').innerHTML = '<div class="carregando">Nenhum professor ainda.</div>'; return; }
    const linhas = data.map(p => {
      const cod = p.codigos?.[0]
      const foto = p.foto_url ? '<img src="' + p.foto_url + '">' : p.nome.charAt(0)
      return '<tr>' +
        '<td><div class="professor-cell"><div class="foto-mini">' + foto + '</div>' + p.nome + '</div></td>' +
        '<td>' + p.area + '</td>' +
        '<td>' + (cod ? '<span class="codigo-badge">' + cod.codigo + '</span>' : '—') + '</td>' +
        '<td>' + (cod ? '<span class="badge-status ' + (cod.ativo ? 'ativo' : 'inativo') + '">' + (cod.ativo ? 'Ativo' : 'Inativo') + '</span>' : '—') + '</td>' +
        '<td style="display:flex;gap:6px;align-items:center;">' + '<button class="btn-editar" onclick="abrirEdicao(\'' + p.id + '\')">✏️ Editar</button>' + (cod ? '<button class="btn-copiar" onclick="copiar(\'' + cod.codigo + '\')">' + 'Copiar</button>' : '') + '</td>' +
        '</tr>'
    }).join('')
    document.getElementById('tabela-professores').innerHTML = '<table class="tabela"><thead><tr><th>Professor</th><th>Carreira</th><th>Código</th><th>Status</th><th>Ação</th></tr></thead><tbody>' + linhas + '</tbody></table>'
  }

  function copiar(codigo) { navigator.clipboard.writeText(codigo); alert('Código ' + codigo + ' copiado!') }

  async function cadastrarMissao() {
    const titulo = document.getElementById('missao-titulo').value.trim()
    const tipo = document.getElementById('missao-tipo').value
    const data = document.getElementById('missao-data').value
    const horario = document.getElementById('missao-horario').value
    const desc = document.getElementById('missao-desc').value.trim()
    const btn = document.querySelector('#secao-missoes .btn')
    if (!titulo || !tipo || !desc) { mostrarMsg('msg-missao', 'Preencha título, tipo e descrição.', 'erro'); return; }
    btn.disabled = true; btn.textContent = 'Publicando...'
    const link_acao = document.getElementById('missao-link').value.trim()
    const cta_texto = document.getElementById('missao-cta').value.trim() || '🎯 Resgatar figurinha'
    const descCompleta = desc + (data ? '\n📅 ' + formatarData(data) + (horario ? ' às ' + horario : '') : '')
    const { error } = await sb.from('missoes').insert({ titulo, tipo, descricao: descCompleta, link_acao: link_acao || null, cta_texto, ativa: true })
    if (error) { mostrarMsg('msg-missao', 'Erro: ' + error.message, 'erro') }
    else {
      mostrarMsg('msg-missao', '✅ Missão publicada!', 'sucesso')
      document.getElementById('missao-titulo').value = ''
      document.getElementById('missao-tipo').value = ''
      document.getElementById('missao-data').value = ''
      document.getElementById('missao-horario').value = ''
      document.getElementById('missao-desc').value = ''
      document.getElementById('missao-link').value = ''
      document.getElementById('missao-cta').value = ''
      await carregarMissoes()
    }
    btn.disabled = false; btn.textContent = 'Publicar missão'
  }

  function formatarData(data) {
    const [ano, mes, dia] = data.split('-')
    return dia + '/' + mes + '/' + ano
  }

  async function carregarMissoes() {
    const { data } = await sb.from('missoes').select('*').order('criado_em', { ascending: false })
    if (!data || data.length === 0) { document.getElementById('lista-missoes').innerHTML = '<div class="carregando">Nenhuma missão ainda.</div>'; return; }
    document.getElementById('lista-missoes').innerHTML = data.map(m =>
      '<div class="missao-lista-item">' +
      '<div class="missao-info">' +
      '<div class="missao-titulo-item">' + m.titulo + '</div>' +
      '<div class="missao-desc-item">' + m.descricao.replace(/\n/g, '<br>') + '</div>' +
      (m.link_acao ? '<div class="missao-link-item">🔗 ' + m.link_acao + '</div>' : '') +
      '<div class="missao-status">' + (m.ativa ? '🟢 Ativa' : '🔴 Inativa') + '</div>' +
      '</div>' +
      '<div class="missao-acoes">' +
      '<span class="tipo-badge">' + m.tipo + '</span>' +
      '<button class="btn-acao-missao btn-editar-missao" onclick="abrirEdicaoMissao('' + m.id + '')">✏️ Editar</button>' +
      '<button class="btn-acao-missao btn-toggle-missao" onclick="toggleMissao('' + m.id + '',' + m.ativa + ')">' + (m.ativa ? '⏸ Desativar' : '▶️ Ativar') + '</button>' +
      '<button class="btn-acao-missao btn-excluir-missao" onclick="excluirMissao('' + m.id + '', '' + m.titulo.replace(/'/g, "\'") + '')">🗑 Excluir</button>' +
      '</div></div>'
    ).join('')
  }

  async function toggleMissao(id, ativa) {
    const { error } = await sb.from('missoes').update({ ativa: !ativa }).eq('id', id)
    if (!error) carregarMissoes()
  }

  async function excluirMissao(id, titulo) {
    if (!confirm('Excluir a missão "' + titulo + '"? Esta ação não pode ser desfeita.')) return
    const { error } = await sb.from('missoes').delete().eq('id', id)
    if (!error) carregarMissoes()
    else alert('Erro ao excluir: ' + error.message)
  }

  async function abrirEdicaoMissao(id) {
    const { data: m, error } = await sb.from('missoes').select('*').eq('id', id).single()
    if (error || !m) { alert('Erro ao carregar missão.'); return; }

    document.getElementById('edit-missao-id').value = m.id
    document.getElementById('edit-missao-titulo').value = m.titulo || ''
    document.getElementById('edit-missao-tipo').value = m.tipo || ''
    document.getElementById('edit-missao-desc').value = m.descricao || ''
    document.getElementById('edit-missao-link').value = m.link_acao || ''
    document.getElementById('edit-missao-cta').value = m.cta_texto || ''
    document.getElementById('msg-edicao-missao').style.display = 'none'
    document.getElementById('modal-edicao-missao').classList.add('visivel')
  }

  async function salvarEdicaoMissao() {
    const id = document.getElementById('edit-missao-id').value
    const titulo = document.getElementById('edit-missao-titulo').value.trim()
    const tipo = document.getElementById('edit-missao-tipo').value
    const descricao = document.getElementById('edit-missao-desc').value.trim()
    const link_acao = document.getElementById('edit-missao-link').value.trim()
    const cta_texto = document.getElementById('edit-missao-cta').value.trim() || '🎯 Resgatar figurinha'
    const btn = document.getElementById('btn-salvar-missao')

    if (!titulo || !tipo || !descricao) { mostrarMsg('msg-edicao-missao', 'Preencha título, tipo e descrição.', 'erro'); return; }

    btn.disabled = true; btn.textContent = 'Salvando...'
    const { error } = await sb.from('missoes').update({ titulo, tipo, descricao, link_acao: link_acao || null, cta_texto }).eq('id', id)

    if (error) mostrarMsg('msg-edicao-missao', 'Erro: ' + error.message, 'erro')
    else {
      mostrarMsg('msg-edicao-missao', '✅ Missão atualizada!', 'sucesso')
      setTimeout(() => { fecharEdicaoMissao(); carregarMissoes() }, 800)
    }
    btn.disabled = false; btn.textContent = 'Salvar alterações'
  }

  function fecharEdicaoMissao() {
    document.getElementById('modal-edicao-missao').classList.remove('visivel')
  }

  async function carregarConfiguracao() {
    const { data } = await sb.from('configuracoes').select('valor').eq('chave', 'texto_compartilhamento').single()
    if (data) document.getElementById('texto-compartilhamento').value = data.valor
  }

  async function salvarConfiguracao() {
    const valor = document.getElementById('texto-compartilhamento').value.trim()
    const btn = document.querySelector('#secao-configuracoes .btn')
    if (!valor) { mostrarMsg('msg-config', 'O texto não pode estar vazio.', 'erro'); return; }
    btn.disabled = true; btn.textContent = 'Salvando...'
    const { error } = await sb.from('configuracoes').upsert({ chave: 'texto_compartilhamento', valor, atualizado_em: new Date().toISOString() })
    if (error) mostrarMsg('msg-config', 'Erro: ' + error.message, 'erro')
    else mostrarMsg('msg-config', '✅ Texto salvo!', 'sucesso')
    btn.disabled = false; btn.textContent = 'Salvar texto'
  }

  function mostrarMsg(id, texto, tipo) {
    const el = document.getElementById(id)
    el.textContent = texto
    el.className = 'mensagem ' + tipo
    el.style.display = 'block'
  }

  // ---- EDIÇÃO DE PROFESSOR ----
  let fotoEditArquivo = null
  let professorEditAtual = null

  async function abrirEdicao(id) {
    const { data: p, error } = await sb.from('professores').select('*').eq('id', id).single()
    if (error || !p) { alert('Erro ao carregar professor.'); return; }

    professorEditAtual = p
    fotoEditArquivo = null

    document.getElementById('edit-id').value = p.id
    document.getElementById('edit-nome').value = p.nome || ''
    document.getElementById('edit-area').value = p.area || ''
    document.getElementById('edit-rede-social').value = p.rede_social || ''
    document.getElementById('edit-rede-social-url').value = p.rede_social_url || ''
    document.getElementById('msg-edicao').style.display = 'none'

    const preview = document.getElementById('foto-edit-preview')
    preview.innerHTML = p.foto_url
      ? '<img src="' + p.foto_url + '" alt="foto">'
      : '📷'

    document.getElementById('modal-edicao').classList.add('visivel')
  }

  function previewFotoEdit(event) {
    const file = event.target.files[0]
    if (!file) return
    fotoEditArquivo = file
    const reader = new FileReader()
    reader.onload = (e) => { document.getElementById('foto-edit-preview').innerHTML = '<img src="' + e.target.result + '">' }
    reader.readAsDataURL(file)
  }

  async function salvarEdicao() {
    const id = document.getElementById('edit-id').value
    const nome = document.getElementById('edit-nome').value.trim()
    const area = document.getElementById('edit-area').value
    const rede_social = document.getElementById('edit-rede-social').value
    const rede_social_url = document.getElementById('edit-rede-social-url').value.trim()
    const btn = document.getElementById('btn-salvar-edicao')
    const msg = document.getElementById('msg-edicao')

    if (!nome || !area) { mostrarMsg('msg-edicao', 'Preencha nome e carreira.', 'erro'); return; }

    btn.disabled = true; btn.textContent = 'Salvando...'

    let foto_url = professorEditAtual.foto_url

    if (fotoEditArquivo) {
      const ext = fotoEditArquivo.name.split('.').pop()
      const nomeArq = Date.now() + '.' + ext
      const { error } = await sb.storage.from('fotos').upload(nomeArq, fotoEditArquivo, { upsert: true })
      if (error) { mostrarMsg('msg-edicao', 'Erro no upload: ' + error.message, 'erro'); btn.disabled = false; btn.textContent = 'Salvar alterações'; return; }
      foto_url = sb.storage.from('fotos').getPublicUrl(nomeArq).data.publicUrl
    }

    const { error } = await sb.from('professores').update({
      nome, area, foto_url,
      rede_social: rede_social || null,
      rede_social_url: rede_social_url || null
    }).eq('id', id)

    if (error) {
      mostrarMsg('msg-edicao', 'Erro ao salvar: ' + error.message, 'erro')
    } else {
      mostrarMsg('msg-edicao', '✅ Professor atualizado!', 'sucesso')
      setTimeout(() => { fecharEdicao(); carregarProfessores() }, 1000)
    }

    btn.disabled = false; btn.textContent = 'Salvar alterações'
  }

  function fecharEdicao() {
    document.getElementById('modal-edicao').classList.remove('visivel')
    document.getElementById('input-foto-edit').value = ''
    fotoEditArquivo = null
  }

  async function sair() { await sb.auth.signOut(); window.location.href = 'index.html' }
  init()
</script>
<!-- MODAL EDIÇÃO -->
<div class="modal-overlay" id="modal-edicao">
  <div class="modal-edicao">
    <h3>✏️ Editar Professor</h3>
    <input type="hidden" id="edit-id">

    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
      <div class="foto-edit-preview" id="foto-edit-preview" onclick="document.getElementById('input-foto-edit').click()">📷</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.6);font-weight:600;">Clique para trocar a foto<br><span style="font-size:11px;color:rgba(255,255,255,0.3);">JPG ou PNG, máx. 2MB</span></div>
      <input type="file" id="input-foto-edit" accept="image/*" onchange="previewFotoEdit(event)" style="display:none;">
    </div>

    <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="edit-nome" placeholder="Nome do professor">
      </div>
      <div class="form-group">
        <label>Carreira</label>
        <select id="edit-area">
          <option value="">Selecione...</option>
          <option>Administrativa</option><option>Bancárias</option>
          <option>Carreira Diplomática</option><option>Carreiras Policiais</option>
          <option>Controle e Gestão</option><option>Delegado</option>
          <option>Educação</option><option>Exame CFC</option>
          <option>Exame da OAB</option><option>Especiais</option>
          <option>Fiscal</option><option>Jurídico</option>
          <option>Legislativa</option><option>Residências</option>
          <option>Saúde</option><option>Segurança Pública</option>
          <option>Tecnologia da Informação</option><option>Tribunais</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rede Social</label>
        <select id="edit-rede-social">
          <option value="">Selecione...</option>
          <option>Instagram</option><option>YouTube</option>
          <option>TikTok</option><option>Twitter</option>
          <option>LinkedIn</option><option>Facebook</option>
        </select>
      </div>
      <div class="form-group">
        <label>Link da Rede Social</label>
        <input type="url" id="edit-rede-social-url" placeholder="https://instagram.com/professor">
      </div>
    </div>

    <div class="modal-acoes">
      <button class="btn-salvar" id="btn-salvar-edicao" onclick="salvarEdicao()">Salvar alterações</button>
      <button class="btn-cancelar-modal" onclick="fecharEdicao()">Cancelar</button>
    </div>
    <div class="mensagem" id="msg-edicao" style="margin-top:12px;"></div>
  </div>
</div>

<!-- MODAL EDIÇÃO MISSÃO -->
<div class="modal-overlay" id="modal-edicao-missao">
  <div class="modal-edicao" style="max-width:560px;">
    <h3>✏️ Editar Missão</h3>
    <input type="hidden" id="edit-missao-id">
    <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group"><label>Título</label><input type="text" id="edit-missao-titulo" placeholder="Título da missão"></div>
      <div class="form-group"><label>Tipo</label>
        <select id="edit-missao-tipo">
          <option value="">Selecione...</option>
          <option>Live</option><option>E-mail</option><option>Blog</option>
          <option>Redes Sociais</option><option>Indicação</option>
        </select>
      </div>
      <div class="form-group full" style="grid-column:1/-1;"><label>Descrição</label><textarea id="edit-missao-desc" style="min-height:80px;width:100%;padding:12px 16px;background:rgba(13,19,76,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:14px;font-family:inherit;outline:none;resize:vertical;"></textarea></div>
      <div class="form-group full" style="grid-column:1/-1;"><label>Link da ação (opcional)</label><input type="url" id="edit-missao-link" placeholder="https://youtube.com/live/..."></div>
      <div class="form-group full" style="grid-column:1/-1;"><label>Texto do botão CTA (máx. 30 caracteres)</label><input type="text" id="edit-missao-cta" placeholder="🎯 Resgatar figurinha" maxlength="30"></div>
    </div>
    <div class="modal-acoes">
      <button class="btn-salvar" id="btn-salvar-missao" onclick="salvarEdicaoMissao()">Salvar alterações</button>
      <button class="btn-cancelar-modal" onclick="fecharEdicaoMissao()">Cancelar</button>
    </div>
    <div class="mensagem" id="msg-edicao-missao" style="margin-top:12px;"></div>
  </div>
</div>

</body>
</html>
