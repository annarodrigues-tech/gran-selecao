<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Seleção — Missões</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      color: #fff;
      display: flex;
      background-image: radial-gradient(ellipse at top, #0d2145 0%, #0a1628 70%);
    }
    .sidebar {
      width: 220px; min-height: 100vh;
      background: #0d1f3c; border-right: 1px solid #1a3a6b;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; z-index: 100;
    }
    .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid #1a3a6b; }
    .sidebar-logo h1 { font-size: 20px; font-weight: 800; }
    .sidebar-logo h1 span { color: #dc1e32; }
    .sidebar-logo p { font-size: 11px; color: #7a9cc4; margin-top: 4px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; color: #7a9cc4;
      transition: all 0.2s; text-decoration: none; margin-bottom: 4px;
    }
    .nav-item:hover { background: #071224; color: #fff; }
    .nav-item.ativo { background: #dc1e32; color: #fff; }
    .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
    .nav-item.admin-item { margin-top: 8px; border-top: 1px solid #1a3a6b; padding-top: 16px; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid #1a3a6b; }
    .btn-sair {
      width: 100%; padding: 10px; background: none;
      border: 1px solid #1a3a6b; color: #7a9cc4;
      border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .btn-sair:hover { border-color: #dc1e32; color: #fff; }
    .content { margin-left: 220px; flex: 1; padding: 32px; }
    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 22px; font-weight: 800; }
    .page-header p { color: #7a9cc4; font-size: 14px; margin-top: 4px; }
    .missoes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .missao-card {
      background: #0d1f3c; border: 1px solid #1a3a6b;
      border-radius: 12px; padding: 20px;
      transition: all 0.2s;
    }
    .missao-card:hover { border-color: #dc1e32; transform: translateY(-2px); }
    .missao-tipo {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #dc1e32; margin-bottom: 10px;
    }
    .missao-titulo { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .missao-desc { font-size: 13px; color: #7a9cc4; line-height: 1.5; }
    .missao-recompensa {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid #1a3a6b;
      font-size: 12px; color: #7a9cc4;
      display: flex; align-items: center; gap: 6px;
    }
    .missao-recompensa strong { color: #fff; }
    .carregando { text-align: center; color: #1a3a6b; padding: 60px 0; font-size: 15px; }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Gran <span>Seleção</span></h1>
    <p>Colecione os professores</p>
  </div>
  <div class="sidebar-nav">
    <a href="album.html" class="nav-item"><span class="icon">📖</span> Meu Álbum</a>
    <a href="missoes.html" class="nav-item ativo"><span class="icon">🎯</span> Missões</a>
    <a href="ranking.html" class="nav-item"><span class="icon">🏆</span> Ranking</a>
    <a href="admin.html" class="nav-item admin-item" id="link-admin" style="display:none"><span class="icon">⚙️</span> Admin</a>
  </div>
  <div class="sidebar-footer">
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</nav>
<div class="content">
  <div class="page-header">
    <h2>Missões</h2>
    <p>Complete missões para desbloquear figurinhas exclusivas!</p>
  </div>
  <div id="missoes-container"><div class="carregando">Carregando missões...</div></div>
</div>
<script>
  const _url = 'https://zjkyaqtaaflvdqpqeabm.supabase.co'
  const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqa3lhcXRhYWZsdmRxcHFlYWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODg3MDcsImV4cCI6MjA5NTI2NDcwN30.uNrqA8ctiG_QlR10wYSVagFi-dmyhQxKCzLZYKe6Gfg'
  const sb = window.supabase.createClient(_url, _key)

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'index.html'; return; }
    const { data: admin } = await sb.from('admins').select('id').eq('user_id', session.user.id).single()
    if (admin) document.getElementById('link-admin').style.display = 'flex'
    await carregarMissoes()
  }

  async function carregarMissoes() {
    const { data, error } = await sb.from('missoes').select('*').eq('ativa', true).order('criado_em', { ascending: false })
    const container = document.getElementById('missoes-container')
    if (error || !data || data.length === 0) {
      container.innerHTML = '<div class="carregando">Nenhuma missão disponível no momento. Fique de olho!</div>'
      return
    }
    container.innerHTML = '<div class="missoes-grid">' + data.map(m =>
      '<div class="missao-card">' +
      '<div class="missao-tipo">' + m.tipo + '</div>' +
      '<div class="missao-titulo">' + m.titulo + '</div>' +
      '<div class="missao-desc">' + m.descricao + '</div>' +
      '<div class="missao-recompensa">🎴 Recompensa: <strong>1 figurinha exclusiva</strong></div>' +
      '</div>'
    ).join('') + '</div>'
  }

  async function sair() { await sb.auth.signOut(); window.location.href = 'index.html' }
  init()
</script>
</body>
</html>
