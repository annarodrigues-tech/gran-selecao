<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Seleção — Missões</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --vermelho: #DD303E; --azul: #0D134C; --branco: #FFFFFF; }
    body { font-family: 'Nunito', 'Trebuchet MS', sans-serif; background: linear-gradient(135deg, #0D134C 0%, #111a5e 100%); min-height: 100vh; color: var(--branco); display: flex; }
    .sidebar { width: 230px; min-height: 100vh; background: rgba(10,15,60,0.95); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 28px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .logo-marca { display: flex; align-items: center; gap: 10px; }
    .logo-icone { width: 38px; height: 38px; background: var(--vermelho); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(221,48,62,0.4); }
    .logo-texto h1 { font-size: 18px; font-weight: 900; line-height: 1; }
    .logo-texto h1 span { color: var(--vermelho); }
    .logo-texto p { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-section-title { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 10px; margin: 16px 0 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.45); transition: all 0.2s; text-decoration: none; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-item.ativo { background: var(--vermelho); color: var(--branco); box-shadow: 0 4px 12px rgba(221,48,62,0.3); }
    .nav-item .icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
    .btn-sair { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all 0.2s; }
    .btn-sair:hover { background: rgba(221,48,62,0.15); border-color: rgba(221,48,62,0.3); color: var(--branco); }
    .content { margin-left: 230px; flex: 1; padding: 36px; }
    .page-header { margin-bottom: 32px; }
    .page-header h2 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
    .page-header p { color: rgba(255,255,255,0.45); font-size: 14px; margin-top: 4px; font-weight: 600; }
    .missoes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .missao-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .missao-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--vermelho);
      border-radius: 4px 0 0 4px;
    }
    .missao-card:hover { border-color: rgba(221,48,62,0.3); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
    .missao-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .missao-tipo { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: var(--vermelho); background: rgba(221,48,62,0.1); border: 1px solid rgba(221,48,62,0.2); padding: 4px 10px; border-radius: 100px; }
    .missao-titulo { font-size: 16px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
    .missao-desc { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; font-weight: 600; }
    .missao-rodape { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); }
    .carregando { text-align: center; color: rgba(255,255,255,0.15); padding: 60px 0; font-size: 15px; font-weight: 700; }
    .vazio { text-align: center; padding: 80px 32px; color: rgba(255,255,255,0.3); }
    .vazio .vazio-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .vazio strong { display: block; font-size: 18px; font-weight: 800; margin-bottom: 8px; color: rgba(255,255,255,0.5); }
    .vazio p { font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-marca">
      <div class="logo-icone">🎴</div>
      <div class="logo-texto">
        <h1>Gran <span>Seleção</span></h1>
        <p>Álbum de figurinhas</p>
      </div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section-title">Menu</div>
    <a href="album.html" class="nav-item"><span class="icon">📖</span> Meu Álbum</a>
    <a href="missoes.html" class="nav-item ativo"><span class="icon">🎯</span> Missões</a>
    <a href="ranking.html" class="nav-item"><span class="icon">🏆</span> Ranking</a>
    <a href="admin.html" class="nav-item" id="link-admin" style="display:none"><span class="icon">⚙️</span> Admin</a>
  </div>
  <div class="sidebar-footer">
    <button class="btn-sair" onclick="sair()">↩ Sair</button>
  </div>
</nav>
<div class="content">
  <div class="page-header">
    <h2>Missões</h2>
    <p>Complete missões para desbloquear figurinhas exclusivas dos professores!</p>
  </div>
  <div id="missoes-container"><div class="carregando">Carregando missões...</div></div>
</div>
<script>
  const _url = 'https://zjkyaqtaaflvdqpqeabm.supabase.co'
  const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqa3lhcXRhYWZsdmRxcHFlYWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODg3MDcsImV4cCI6MjA5NTI2NDcwN30.uNrqA8ctiG_QlR10wYSVagFi-dmyhQxKCzLZYKe6Gfg'
  const sb = window.supabase.createClient(_url, _key)

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'index.html'; return; }
    const { data: admin } = await sb.from('admins').select('id').eq('user_id', session.user.id).single()
    if (admin) document.getElementById('link-admin').style.display = 'flex'
    await carregarMissoes()
  }

  async function carregarMissoes() {
    const { data, error } = await sb.from('missoes').select('*').eq('ativa', true).order('criado_em', { ascending: false })
    const container = document.getElementById('missoes-container')
    if (error || !data || data.length === 0) {
      container.innerHTML = '<div class="vazio"><div class="vazio-icon">🎯</div><strong>Nenhuma missão disponível</strong><p>Fique de olho! Em breve novas missões serão publicadas.</p></div>'
      return
    }
    container.innerHTML = '<div class="missoes-grid">' + data.map(m =>
      '<div class="missao-card">' +
      '<div class="missao-header"><span class="missao-tipo">' + m.tipo + '</span></div>' +
      '<div class="missao-titulo">' + m.titulo + '</div>' +
      '<div class="missao-desc">' + m.descricao.replace(/\n/g, '<br>') + '</div>' +
      '<div class="missao-rodape">🎴 Recompensa: <strong style="color:#fff">1 figurinha exclusiva</strong></div>' +
      '</div>'
    ).join('') + '</div>'
  }

  async function sair() { await sb.auth.signOut(); window.location.href = 'index.html' }
  init()
</script>
</body>
</html>
