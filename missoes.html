<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imparáveis — Missões</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --amarelo: #F3BF1A;
      --verde: #04492A; --azul: #0D134C; --branco: #FFFFFF; }

    body { font-family: 'Nunito', 'Trebuchet MS', sans-serif; background: linear-gradient(135deg, #0D134C 0%, #111a5e 100%); min-height: 100vh; color: var(--branco); display: flex; }

    .sidebar { width: 230px; min-height: 100vh; background: rgba(10,15,60,0.95); border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-logo { padding: 28px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .logo-marca { display: flex; align-items: center; gap: 10px; }
    .logo-icone { width: 38px; height: 38px; background: var(--amarelo); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(243,191,26,0.4); }
    .logo-texto h1 { font-size: 18px; font-weight: 900; line-height: 1; }
    .logo-texto h1 span { color: var(--amarelo); }
    .logo-texto p { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-section-title { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 10px; margin: 16px 0 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.45); transition: all 0.2s; text-decoration: none; margin-bottom: 2px; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
    .nav-item.ativo { background: #04492A; color: var(--branco); box-shadow: 0 4px 12px rgba(4,73,42,0.3); }
    .nav-item .icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
    .btn-sair { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all 0.2s; }
    .btn-sair:hover { background: rgba(243,191,26,0.15); border-color: rgba(243,191,26,0.3); color: var(--branco); }

    .content { margin-left: 230px; flex: 1; padding: 36px; }

    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
    .page-header p { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 4px; font-weight: 600; }

    .preview-banner {
      background: rgba(243,191,26,0.1);
      border: 1px solid rgba(243,191,26,0.25);
      border-radius: 12px;
      padding: 12px 18px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
    }

    .preview-banner span { font-size: 18px; }

    .missoes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .missao-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .missao-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--amarelo);
      border-radius: 4px 0 0 4px;
    }

    .missao-card:hover {
      border-color: rgba(243,191,26,0.3);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }

    .missao-card.preview {
      opacity: 0.55;
      filter: blur(1.5px);
      pointer-events: none;
      user-select: none;
    }

    .missao-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .missao-tipo {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--amarelo);
      background: rgba(243,191,26,0.1);
      border: 1px solid rgba(243,191,26,0.2);
      padding: 4px 10px;
      border-radius: 100px;
    }

    .missao-icone { font-size: 20px; }

    .missao-titulo {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.3;
      color: var(--branco);
    }

    .missao-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .missao-rodape {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .missao-recompensa {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
    }

    .missao-recompensa strong { color: var(--branco); }

    .missao-data {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-cta-missao {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: #04492A;
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      transition: all 0.2s;
      font-family: 'Nunito', 'Trebuchet MS', sans-serif;
      box-shadow: 0 4px 12px rgba(243,191,26,0.3);
    }
    .btn-cta-missao:hover { background: #035c35; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(243,191,26,0.4); }

    .carregando { text-align: center; color: rgba(255,255,255,0.15); padding: 60px 0; font-size: 15px; font-weight: 700; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-marca">
      <img src="https://zjkyaqtaaflvdqpqeabm.supabase.co/storage/v1/object/public/fotos/gran_logo.png" alt="Gran" style="width:38px;height:38px;object-fit:contain;">
      <div class="logo-texto">
        <h1><span>Imparáveis</span></h1>
        
      </div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section-title">Menu</div>
    <a href="album.html" class="nav-item"><span class="icon">📖</span> Meu Álbum</a>
    <a href="missoes.html" class="nav-item ativo"><span class="icon">🎯</span> Missões</a>
    <a href="ranking.html" class="nav-item"><span class="icon">🏆</span> Ranking</a>
    <a href="admin.html" class="nav-item" id="link-admin" style="display:none"><span class="icon">⚙️</span> Admin</a>
  </div>
  <div class="sidebar-footer">
    <button class="btn-sair" onclick="sair()">↩ Sair</button>
  </div>
</nav>

<div class="content">
  <div class="page-header">
    <h2>Missões</h2>
    <p>Complete missões para desbloquear figurinhas exclusivas dos professores!</p>
  </div>
  <div id="missoes-container"><div class="carregando">Carregando missões...</div></div>
</div>

<script>
  const _url = 'https://zjkyaqtaaflvdqpqeabm.supabase.co'
  const _key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqa3lhcXRhYWZsdmRxcHFlYWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODg3MDcsImV4cCI6MjA5NTI2NDcwN30.uNrqA8ctiG_QlR10wYSVagFi-dmyhQxKCzLZYKe6Gfg'
  const sb = window.supabase.createClient(_url, _key)

  const missoesPreview = [
    {
      tipo: 'Live',
      icone: '🎥',
      titulo: 'Assista a live de Direito Fiscal',
      descricao: 'Participe da live ao vivo com o Prof. Alexandre Meirelles e fique atento ao código secreto que ele vai revelar durante a transmissão!',
      data: '28/05 às 19h',
      preview: false
    },
    {
      tipo: 'E-mail',
      icone: '📧',
      titulo: 'Baixe o guia de Carreiras Policiais',
      descricao: 'Faça o download do material exclusivo de Carreiras Policiais e receba o código da figurinha do Prof. Érico Palazzo direto no seu e-mail.',
      data: null,
      preview: false
    },
    {
      tipo: 'Blog',
      icone: '📝',
      titulo: 'Leia o post sobre OAB',
      descricao: 'Acesse o post completo no blog do Gran sobre as novidades do Exame da OAB e encontre o código escondido no texto.',
      data: null,
      preview: false
    },
    {
      tipo: 'Indicação',
      icone: '👥',
      titulo: 'Indique um amigo para os Imparáveis',
      descricao: 'Compartilhe seu link exclusivo e ganhe a figurinha especial quando seu amigo se cadastrar e resgatar o primeiro código.',
      data: null,
      preview: true
    },
    {
      tipo: 'Redes Sociais',
      icone: '📱',
      titulo: 'Siga o Gran no Instagram',
      descricao: 'Siga o perfil oficial do Gran no Instagram e fique de olho nos stories — o código da próxima figurinha será revelado por lá.',
      data: 'Em breve',
      preview: true
    },
    {
      tipo: 'Live',
      icone: '🎥',
      titulo: 'Live especial de Tecnologia da Informação',
      descricao: 'Grande live com o Prof. Vitor Alexandre Kessler cobrindo os principais tópicos de TI para concursos. Código revelado ao vivo!',
      data: 'Em breve',
      preview: true
    },
  ]

  async function init() {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'index.html'; return; }
    const { data: admin } = await sb.from('admins').select('id').eq('user_id', session.user.id).single()
    if (admin) document.getElementById('link-admin').style.display = 'flex'
    await carregarMissoes()
  }

  async function carregarMissoes() {
    const { data, error } = await sb.from('missoes').select('*').eq('ativa', true).order('criado_em', { ascending: false })
    const container = document.getElementById('missoes-container')
    const usandoPreview = error || !data || data.length === 0

    if (usandoPreview) {
      renderizarPreview(container)
    } else {
      renderizarReais(container, data)
    }
  }

  function renderizarPreview(container) {
    const banner = '<div class="preview-banner"><span>👀</span> Prévia das missões — as missões reais serão publicadas pela equipe Gran em breve!</div>'
    const cards = '<div class="missoes-grid">' + missoesPreview.map(m => {
      return '<div class="missao-card' + (m.preview ? ' preview' : '') + '">' +
        '<div class="missao-header">' +
        '<span class="missao-tipo">' + m.tipo + '</span>' +
        '<span class="missao-icone">' + m.icone + '</span>' +
        '</div>' +
        '<div class="missao-titulo">' + m.titulo + '</div>' +
        '<div class="missao-desc">' + m.descricao + '</div>' +
        '<div class="missao-rodape"><div class="missao-recompensa">🎴 Recompensa: <strong>1 figurinha</strong></div>' + (m.data ? '<div class="missao-data">📅 ' + m.data + '</div>' : '') + '</div>' +
        '<a href="' + (m.link || '#') + '" ' + (m.link ? 'target="_blank"' : 'onclick="return false"') + ' class="btn-cta-missao" style="' + (m.link ? '' : 'opacity:0.4;cursor:default;') + '">🎯 Resgatar figurinha</a>' +
        '</div>'
    }).join('') + '</div>'
    container.innerHTML = banner + cards
  }

  function renderizarReais(container, data) {
    const tipoIcone = { 'Live': '🎥', 'E-mail': '📧', 'Blog': '📝', 'Redes Sociais': '📱', 'Indicação': '👥' }
    const cards = '<div class="missoes-grid">' + data.map(m => {
      return '<div class="missao-card">' +
        '<div class="missao-header">' +
        '<span class="missao-tipo">' + m.tipo + '</span>' +
        '<span class="missao-icone">' + (tipoIcone[m.tipo] || '🎯') + '</span>' +
        '</div>' +
        '<div class="missao-titulo">' + m.titulo + '</div>' +
        '<div class="missao-desc">' + m.descricao.replace(/\n/g, '<br>') + '</div>' +
        '<div class="missao-rodape">' +
        '<div class="missao-recompensa">🎴 Recompensa: <strong>1 figurinha</strong></div>' +
        '</div></div>'
    }).join('') + '</div>'
    container.innerHTML = cards
  }

  async function sair() { await sb.auth.signOut(); window.location.href = 'index.html' }
  init()
</script>
</body>
</html>
